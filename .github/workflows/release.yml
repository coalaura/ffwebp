name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Run integration tests
      env:
        CGO_ENABLED: 1
        CC: zig cc -target x86_64-linux-gnu
        CXX: zig c++ -target x86_64-linux-gnu
      # We do NOT pass the 'play' tag here, so tests run headlessly without Ebiten panicking
      run: go test -v ./integration

  build:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            flavour: core
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            flavour: full
          - goos: linux
            goarch: amd64
            flavour: "full,play"
            suffix: "-play"

          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            flavour: core
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            flavour: full
          - goos: linux
            goarch: arm64
            flavour: "full,play"
            suffix: "-play"

          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            flavour: core
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            flavour: full
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            flavour: "full,play"
            suffix: "-play"

          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            flavour: core
          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            flavour: full
          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            flavour: "full,play"
            suffix: "-play"
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux GUI dependencies
      if: matrix.goos == 'linux' && matrix.suffix == '-play'
      run: |
        # Fix Ubuntu 24.04 APT sources to support arm64 cross-compilation
        cat << 'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu.sources
        Types: deb
        URIs: http://archive.ubuntu.com/ubuntu/
        Suites: noble noble-updates noble-backports
        Components: main restricted universe multiverse
        Architectures: amd64

        Types: deb
        URIs: http://security.ubuntu.com/ubuntu/
        Suites: noble-security
        Components: main restricted universe multiverse
        Architectures: amd64

        Types: deb
        URIs: http://ports.ubuntu.com/ubuntu-ports/
        Suites: noble noble-updates noble-backports noble-security
        Components: main restricted universe multiverse
        Architectures: arm64
        EOF

        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y gcc gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxext-dev libxxf86vm-dev libgl1-mesa-dev xorg-dev \
          libx11-dev:arm64 libxrandr-dev:arm64 libxcursor-dev:arm64 libxinerama-dev:arm64 libxi-dev:arm64 libxext-dev:arm64 libxxf86vm-dev:arm64 libgl1-mesa-dev:arm64

    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Generate Windows resources
      if: matrix.goos == 'windows'
      run: |
        go install github.com/tc-hib/go-winres@latest
        go-winres simply \
          --manifest cli \
          --product-name FFWebP \
          --original-filename ffwebp.exe \
          --icon logo.ico \
          --copyright "(c) 2025 coalaura" \
          --file-description "Convert any image format into any other image format" \
          --file-version "${{ github.ref_name }}" \
          --arch "${{ matrix.goarch }}"

    - name: Build ${{ matrix.goos }}_${{ matrix.goarch }} (${{ matrix.flavour }})
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 1
      run: |
        mkdir -p build

        LDFLAGS=""
        EXT=""

        if [[ "$GOOS" == "windows" ]]; then
          export CC="zig cc -target ${{ matrix.zig_target }}"
          export CXX="zig c++ -target ${{ matrix.zig_target }}"
          EXT=".exe"
        elif [[ "$GOOS" == "linux" && "${{ matrix.suffix }}" == "-play" ]]; then
          # Use GCC for Linux GUI builds to avoid Zig CC's glibc/X11 header conflicts
          if [[ "$GOARCH" == "arm64" ]]; then
            export CC="aarch64-linux-gnu-gcc"
            export CXX="aarch64-linux-gnu-g++"
            export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          else
            export CC="gcc"
            export CXX="g++"
          fi
        else
          export CC="zig cc -target ${{ matrix.zig_target }}"
          export CXX="zig c++ -target ${{ matrix.zig_target }}"
          if [[ "${{ matrix.zig_target }}" == *"musl"* ]]; then
            LDFLAGS="-linkmode external -extldflags '-static'"
          fi
        fi

        FLAVOUR_NAME="core"
        if [[ "${{ matrix.flavour }}" == *"full"* ]]; then
          FLAVOUR_NAME="full"
        fi

        OUT="build/ffwebp_${{ github.ref_name }}_${FLAVOUR_NAME}${{ matrix.suffix }}_${{ matrix.goos }}_${{ matrix.goarch }}${EXT}"

        go build \
          -trimpath \
          -buildvcs=false \
          -ldflags "-s -w -X 'main.Version=${{ github.ref_name }}' $LDFLAGS" \
          -tags "${{ matrix.flavour }}" \
          -o "$OUT" ./cmd/ffwebp

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffwebp_${{ github.ref_name }}_${{ matrix.flavour }}_${{ matrix.goos }}_${{ matrix.goarch }}
        path: build/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./build

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: ./build/**
        name: "Release ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}