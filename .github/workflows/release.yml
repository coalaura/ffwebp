name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxext-dev libxxf86vm-dev libgl1-mesa-dev xorg-dev

    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Run integration tests
      env:
        CGO_ENABLED: 1
        CC: zig cc -target x86_64-linux-gnu
        CXX: zig c++ -target x86_64-linux-gnu
        CGO_CFLAGS: "-I/usr/include/X11 -I/usr/include/GL"
      run: go test -v ./integration

  build:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            flavour: core
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            flavour: full
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            flavour: core
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            flavour: full
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            flavour: core
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            flavour: full
          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            flavour: core
          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            flavour: full
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: matrix.goos == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxext-dev libxxf86vm-dev libgl1-mesa-dev xorg-dev

    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Generate Windows resources
      if: matrix.goos == 'windows'
      run: |
        go install github.com/tc-hib/go-winres@latest
        go-winres simply \
          --manifest cli \
          --product-name FFWebP \
          --original-filename ffwebp.exe \
          --icon logo.ico \
          --copyright "(c) 2025 coalaura" \
          --file-description "Convert any image format into any other image format" \
          --file-version "${{ github.ref_name }}" \
          --arch "${{ matrix.goarch }}"

    - name: Build ${{ matrix.goos }}_${{ matrix.goarch }} (${{ matrix.flavour }})
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 1
        CC: zig cc -target ${{ matrix.zig_target }}
        CXX: zig c++ -target ${{ matrix.zig_target }}
      run: |
        mkdir -p build
        [[ "$GOOS" == "windows" ]] && EXT=".exe" || EXT=""

        OUT="build/ffwebp_${{ github.ref_name }}_${{ matrix.flavour }}_${{ matrix.goos }}_${{ matrix.goarch }}${EXT}"

        if [[ "${{ matrix.zig_target }}" == *"musl"* ]]; then
          LDFLAGS="-linkmode external -extldflags '-static'"
          export CGO_CFLAGS="-I/usr/include/X11 -I/usr/include/GL"
        else
          LDFLAGS=""
        fi

        go build \
          -trimpath \
          -buildvcs=false \
          -ldflags "-s -w -X 'main.Version=${{ github.ref_name }}' $LDFLAGS" \
          -tags "${{ matrix.flavour }}" \
          -o "$OUT" ./cmd/ffwebp

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffwebp_${{ github.ref_name }}_${{ matrix.flavour }}_${{ matrix.goos }}_${{ matrix.goarch }}
        path: build/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./build

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: ./build/**
        name: "Release ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}